<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>강남 프리미엄 홈케어 | 24시간 상담 · 즉시 예약</title>
<meta name="description" content="강남 역삼 프리미엄 홈케어 방문 서비스. 24시간 상담, 빠른 방문, 간편 예약.">

<style>
html {scroll-behavior:smooth;}
body {margin:0;font-family:Arial;background:#0b0f0c;color:#fff;}

.header {
    position:fixed;
    width:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    z-index:999;
}
.logo {color:#d4af37;font-weight:bold;}
.nav a {
    color:#fff;
    margin:0 8px;
    text-decoration:none;
}
.nav a.active {
    color:#d4af37;
    border-bottom:2px solid #d4af37;
}

.hero {
    position:relative;
    height:90vh;
    background:url('main.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
}
.hero::after {
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}
.hero-content {
    position:relative;
    z-index:2;
    padding:20px;
}
.hero h1 {font-size:32px;color:#d4af37;}
.hero p {color:#ddd;margin:15px 0;}

.btn {
    display:inline-block;
    padding:14px 20px;
    margin:5px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}
.phone {background:#1a73e8;color:#fff;}
.kakao {background:#FEE500;color:#000;}

.section {
    padding:60px 20px;
    text-align:center;
    background:#f5f5f5;
    color:#000;
}

.features, .cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.feature, .card {
    background:#fff;
    padding:20px;
    border-radius:12px;
    width:200px;
}

.card img {
    width:100%;
    border-radius:10px;
}

.price {
    background:#0f3d2e;
    color:#fff;
    padding:20px;
    border-radius:10px;
    display:inline-block;
}

.fixed-bar {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    z-index:999;
}
.fixed-bar a {
    flex:1;
    text-align:center;
    padding:15px;
    font-weight:bold;
    text-decoration:none;
}
.fixed-bar a:first-child {
    background:#1a73e8;
    color:#fff;
}
.fixed-bar a:last-child {
    background:#FEE500;
    color:#000;
}

.footer {
    background:#000;
    text-align:center;
    padding:20px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">VIP HOMECARE</div>
    <div class="nav">
        <a href="#home">홈</a>
        <a href="#service">서비스</a>
        <a href="#price">요금</a>
        <a href="#review">후기</a>
    </div>
</div>

<div class="hero" id="home">
    <div class="hero-content">
        <h1>강남 프리미엄 방문 홈케어</h1>
        <p>24시간 상담 · 빠른 방문 · 프라이빗 케어</p>

        <a class="btn phone" href="tel:01068600697">📞 전화 예약</a>
        <a class="btn kakao" href="https://open.kakao.com/o/sMzFxoti">💬 카톡 상담</a>
    </div>
</div>

<div class="section" id="service">
    <h2>서비스 안내</h2>
    <div class="cards">
        <div class="card">
            <img src="service1.jpg">
            <p>스웨디시 마사지</p>
        </div>
        <div class="card">
            <img src="service2.jpg">
            <p>아로마 테라피</p>
        </div>
        <div class="card">
            <img src="service3.jpg">
            <p>힐링 마사지</p>
        </div>
    </div>
</div>

<div class="section" id="price">
    <h2>이용 요금</h2>
    <div class="price">
        60분 100,000원<br>
        90분 140,000원<br>
        120분 180,000원
    </div>
</div>

<div class="section" id="review">
    <h2>고객 후기</h2>
    <p>⭐⭐⭐⭐⭐ 만족도 높은 서비스</p>
</div>

<div class="section">
    <h2>위치 안내</h2>
    <iframe src="https://www.google.com/maps?q=역삼역&output=embed"
    width="100%" height="300" style="border-radius:10px;"></iframe>
</div>

<div class="section">
    <h2>지금 바로 예약하세요</h2>
    <a class="btn phone" href="tel:01068600697">📞 전화하기</a>
    <a class="btn kakao" href="https://open.kakao.com/o/sMzFxoti">💬 카톡</a>
</div>

<div class="footer">
    © Homecare Service
</div>

<!-- 🔥 하단 고정 -->
<div class="fixed-bar">
    <a href="tel:01068600697">📞 전화</a>
    <a href="https://open.kakao.com/o/sMzFxoti">💬 카톡</a>
</div>

<script>
const sections = document.querySelectorAll("div[id]");
const navLinks = document.querySelectorAll(".nav a");

window.addEventListener("scroll", () => {
  let current = "";

  sections.forEach(section => {
    const sectionTop = section.offsetTop - 100;
    if (pageYOffset >= sectionTop) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(a => {
    a.classList.remove("active");
    if (a.getAttribute("href") === "#" + current) {
      a.classList.add("active");
    }
  });
});
</script>

</body>
</html>
